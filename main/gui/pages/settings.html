<div class="settings-container">
    <div class="settings-header">
        <h1 data-i18n="settings.title">Settings</h1>
        <p data-i18n="settings.subtitle">Configure your IVIDS experience</p>
    </div>

    <!-- Appearance Settings -->
    <div class="settings-section">
        <h2 class="section-title">
            <svg class="section-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 7.02944 12 3ZM12 3V12M12 3C14.5013 3 16.7386 4.21128 18.1792 6.08296"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span data-i18n="settings.appearance">Appearance</span>
        </h2>

        <div class="setting-item">
            <div class="setting-info">
                <div class="setting-label" data-i18n="settings.language">Language</div>
                <div class="setting-description" data-i18n="settings.languageDesc">Choose your preferred language</div>
            </div>
            <div class="setting-control">
                <div class="custom-select focusable" id="language-select-container" tabindex="0">
                    <div class="select-selected">English</div>
                    <div class="select-items select-hide">
                        <div class="select-item focusable" tabindex="0" data-value="en">English</div>
                        <div class="select-item focusable" tabindex="0" data-value="es">Español</div>
                        <div class="select-item focusable" tabindex="0" data-value="fr">Français</div>
                        <div class="select-item focusable" tabindex="0" data-value="de">Deutsch</div>
                        <div class="select-item focusable" tabindex="0" data-value="nl">Nederlands</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="setting-item color-setting">
            <div class="setting-info">
                <div class="setting-label" data-i18n="settings.accentColor">Accent Color</div>
                <div class="setting-description" data-i18n="settings.accentColorDesc">Choose your preferred theme color
                </div>
            </div>
            <div class="color-row">
                <div class="preset-color focusable active" data-color="#46d369" style="background: #46d369;"
                    title="Green"></div>
                <div class="preset-color focusable" data-color="#e50914" style="background: #e50914;" title="Red"></div>
                <div class="preset-color focusable" data-color="#00d4ff" style="background: #00d4ff;" title="Cyan">
                </div>
                <div class="preset-color focusable" data-color="#9146ff" style="background: #9146ff;" title="Purple">
                </div>
                <div class="preset-color focusable" data-color="#ff6b35" style="background: #ff6b35;" title="Orange">
                </div>
                <div class="preset-color focusable" data-color="#ffd700" style="background: #ffd700;" title="Gold">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Save Notification -->
<div class="save-notification" id="save-notification">
    ✓ Settings saved!
</div>

<style>
    .settings-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 100px 60px 60px 60px;
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .settings-header {
        margin-bottom: 40px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 20px;
    }

    .settings-header h1 {
        font-size: 42px;
        color: var(--primary-color);
        text-shadow: 0 0 20px rgba(var(--primary-color-rgb), 0.3);
        margin-bottom: 10px;
    }

    .settings-header p {
        font-size: 16px;
        color: #999;
    }

    .settings-section {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 25px;
        transition: all 0.3s ease;
    }

    .settings-section:hover {
        border-color: var(--primary-color);
        box-shadow: 0 0 25px rgba(var(--primary-color-rgb), 0.15);
    }

    .section-title {
        font-size: 24px;
        margin-bottom: 20px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .section-icon {
        width: 28px;
        height: 28px;
        color: var(--primary-color);
    }

    .setting-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .setting-item.color-setting {
        flex-direction: row;
        align-items: center;
        gap: 20px;
        padding: 20px 0;
    }

    .setting-item:last-child {
        border-bottom: none;
    }

    .setting-info {
        flex: 1;
    }

    .setting-label {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 5px;
        color: #fff;
    }

    .setting-description {
        font-size: 14px;
        color: #888;
    }

    .setting-control {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* Custom Select Dropdown */
    .custom-select {
        position: relative;
        font-family: inherit;
        min-width: 200px;
    }

    .select-selected {
        background-color: transparent;
        color: #fff;
        padding: 12px 20px;
        border: 1px solid #fff;
        /* White border as requested */
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        font-size: 16px;
    }

    /* Hover and Focus states */
    .custom-select:hover .select-selected,
    .custom-select:focus .select-selected,
    .custom-select.focused .select-selected {
        background-color: var(--primary-color);
        /* Blue/Accent on hover/focus */
        border-color: var(--primary-color);
        transform: scale(1.05);
        /* Scale 1.05 */
        box-shadow: 0 0 15px rgba(var(--primary-color-rgb), 0.3);
    }

    /* Dropdown Items Container */
    .select-items {
        position: absolute;
        background-color: rgba(0, 0, 0, 0.9);
        top: 100%;
        left: 0;
        right: 0;
        z-index: 99;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        margin-top: 5px;
        max-height: 300px;
        overflow-y: auto;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
    }

    /* Hide the items when the select box is closed */
    .select-hide {
        display: none;
    }

    .select-item {
        color: #fff;
        padding: 12px 20px;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: background-color 0.2s;
    }

    .select-item:last-child {
        border-bottom: none;
    }

    .select-item:hover,
    .select-item:focus,
    .select-item.focused,
    .same-as-selected {
        background-color: rgba(255, 255, 255, 0.1);
        outline: none;
    }

    .select-item:hover,
    .select-item:focus,
    .select-item.focused {
        background-color: var(--primary-color);
        color: #000;
    }

    /* Color Row for TV - Horizontal Layout */
    .color-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 0;
    }

    .preset-color {
        width: 70px;
        height: 70px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        border: 2px solid transparent;
        position: relative;
    }

    .preset-color:hover,
    .preset-color:focus,
    .preset-color.focused {
        transform: scale(1.15);
        box-shadow: 0 0 20px rgba(var(--primary-color-rgb), 0.4);
        z-index: 2;
        border-color: #fff;
    }

    .preset-color.active {
        border-color: #fff;
        box-shadow: 0 0 15px rgba(var(--primary-color-rgb), 0.3);
    }

    .preset-color.active::after {
        content: '✓';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .save-notification {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--primary-color);
        color: #000;
        padding: 15px 30px;
        border-radius: 8px;
        font-weight: bold;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1000;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    }

    .save-notification.show {
        transform: translateY(0);
        opacity: 1;
    }
</style>
