<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVIDS - Hero Section Indicators Mockup</title>
    <!-- Premium Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #46d369; /* IVIDS Accent Color */
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --dot-inactive: #555555;
            --dot-active: var(--primary-color);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* 
           Container for the entire mockup page mimicking the web app 
        */
        .mockup-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            box-sizing: border-box;
        }

        .mockup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .mockup-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mockup-header p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1rem;
        }

        /* 
           Hero Section Styling 
        */
        .hero {
            position: relative;
            width: 85%;
            height: 480px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            background-color: #111;
        }

        /* 
           Sliding track wrapper holding all slide backgrounds side-by-side 
        */
        .hero-slides-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 400%; /* 4 slides = 400% width */
            height: 100%;
            display: flex;
            transition: left 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
        }

        /* 
           Individual slide backdrop container 
        */
        .hero-slide {
            position: relative;
            width: 25%; /* 1/4 of track = 100% of hero width */
            height: 100%;
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
        }

        /* 
           Vignette/Mask Overlay for readable text - positioned over the sliding track 
        */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(5, 5, 5, 0.85) 0%, rgba(5, 5, 5, 0.4) 50%, rgba(5, 5, 5, 0.1) 100%),
                        linear-gradient(to top, rgba(5, 5, 5, 0.95) 0%, rgba(5, 5, 5, 0) 60%);
            z-index: 2;
            pointer-events: none;
        }

        /* 
           Hero Content Box - Positioned absolutely at the bottom to remain steady 
           and fade during slide transitions.
        */
        .hero-content {
            position: absolute;
            bottom: 20px;
            left: 0;
            z-index: 3;
            max-width: 60%;
            padding: 40px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out;
        }

        .hero-content.transitioning {
            opacity: 0;
        }

        .hero-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero-desc {
            font-size: 1rem;
            color: #dddddd;
            line-height: 1.5;
            margin: 0 0 25px 0;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* 
           Interactive Play Button: Focus/Hover rules mandate thick white border, no scaling 
        */
        .btn-play {
            background-color: var(--primary-color);
            color: #000000;
            border: 3px solid transparent;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .btn-play:hover, .btn-play:focus {
            background-color: var(--primary-color);
            border-color: #ffffff; /* White thicker border animation */
        }

        /* 
           Circular Navigation Indicators at the top center of the hero 
        */
        .hero-indicators {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }

        /* 
           Individual indicator dot 
        */
        .hero-indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--dot-inactive);
            transition: background-color 0.4s ease;
            cursor: pointer;
        }

        /* 
           Active indicator dot in IVIDS accent color 
        */
        .hero-indicator-dot.active {
            background-color: var(--dot-active);
        }

        /* 
           Manual Navigation Buttons 
        */
        .mockup-controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        .btn-ctrl {
            background-color: #1a1a1a;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 8px 20px;
            border-radius: 6px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .btn-ctrl:hover, .btn-ctrl:focus {
            border-color: #ffffff; /* White thicker border animation */
        }
    </style>
</head>
<body>

<div class="mockup-container">
    <div class="mockup-header">
        <h2>Hero Section Redesign Mockup</h2>
        <p>Left-to-right sliding background with steady, fading text overlay content.</p>
    </div>

    <!-- The Hero Component Structure -->
    <header class="hero" id="hero">
        <!-- Top Indicators Container -->
        <div class="hero-indicators" id="hero-indicators">
            <!-- Dynamically populated circles -->
        </div>

        <!-- Sliding Slides Track (Backdrops Only) -->
        <div class="hero-slides-track" id="hero-slides-track">
            <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1280&q=80')"></div>
            <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&w=1280&q=80')"></div>
            <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1461360370896-922624d12aa1?auto=format&fit=crop&w=1280&q=80')"></div>
            <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?auto=format&fit=crop&w=1280&q=80')"></div>
        </div>

        <!-- Single Vignette Overlay -->
        <div class="hero-overlay"></div>

        <!-- Single Fading Meta Content Area (Absolute Positioned over Track) -->
        <div class="hero-content" id="hero-content">
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-desc" id="hero-desc"></p>
            <div class="hero-buttons">
                <button class="btn-play" id="play-btn">Play</button>
            </div>
        </div>
    </header>

    <div class="mockup-controls">
        <button class="btn-ctrl" onclick="prevSlide()">Previous</button>
        <button class="btn-ctrl" onclick="nextSlide()">Next</button>
        <button class="btn-ctrl" id="toggle-play-btn" onclick="toggleAutoplay()">Pause Autoplay</button>
    </div>
</div>

<script>
    const slidesData = [
        {
            title: "Dune: Part Two",
            overview: "Follow the mythic journey of Paul Atreides as he unites with Chani and the Fremen while on a path of revenge against the conspirators who destroyed his family."
        },
        {
            title: "Stranger Things",
            overview: "When a young boy vanishes, a small town uncovers a mystery involving secret experiments, terrifying supernatural forces and one strange little girl."
        },
        {
            title: "Oppenheimer",
            overview: "The story of American scientist J. Robert Oppenheimer and his role in the development of the atomic bomb, which altered the course of history."
        },
        {
            title: "Interstellar",
            overview: "The adventures of a group of explorers who make use of a newly discovered wormhole to surpass the limitations on human space travel and conquer the vast distances."
        }
    ];

    const totalSlides = slidesData.length;
    let currentIndex = 0;
    let autoplayInterval = null;
    let isAutoplayActive = true;
    const intervalDuration = 5000; // 5 seconds for sliding transitions

    const slidesTrack = document.getElementById('hero-slides-track');
    const heroContent = document.getElementById('hero-content');
    const heroTitle = document.getElementById('hero-title');
    const heroDesc = document.getElementById('hero-desc');
    const indicatorsContainer = document.getElementById('hero-indicators');

    // Create circular dots dynamically
    function setupIndicators() {
        indicatorsContainer.innerHTML = '';
        for (let idx = 0; idx < totalSlides; idx++) {
            const dot = document.createElement('div');
            dot.className = 'hero-indicator-dot';
            if (idx === currentIndex) {
                dot.classList.add('active');
            }
            dot.onclick = () => {
                goToSlide(idx);
                resetAutoplayTimer();
            };
            indicatorsContainer.appendChild(dot);
        }
    }

    // Render slide by setting the horizontal left offset and fading text overlay
    function renderSlide(index) {
        // Start text opacity fade-out
        heroContent.classList.add('transitioning');

        // Shift the background track left by index * 100% (slides horizontally)
        slidesTrack.style.left = `-${index * 100}%`;

        // Update active dots
        const dots = indicatorsContainer.querySelectorAll('.hero-indicator-dot');
        dots.forEach((dot, idx) => {
            if (idx === index) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });

        // Wait for text to fade out before updating content and fading back in
        setTimeout(() => {
            const slide = slidesData[index];
            if (slide) {
                heroTitle.textContent = slide.title;
                heroDesc.textContent = slide.overview;
            }
            heroContent.classList.remove('transitioning');
        }, 300);
    }

    function goToSlide(index) {
        currentIndex = index;
        renderSlide(currentIndex);
    }

    function nextSlide() {
        currentIndex = (currentIndex + 1) % totalSlides;
        renderSlide(currentIndex);
    }

    function prevSlide() {
        currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
        renderSlide(currentIndex);
    }

    // Autoplay Controls
    function startAutoplay() {
        autoplayInterval = setInterval(nextSlide, intervalDuration);
        isAutoplayActive = true;
        document.getElementById('toggle-play-btn').textContent = "Pause Autoplay";
    }

    function stopAutoplay() {
        if (autoplayInterval) {
            clearInterval(autoplayInterval);
            autoplayInterval = null;
        }
        isAutoplayActive = false;
        document.getElementById('toggle-play-btn').textContent = "Start Autoplay";
    }

    function toggleAutoplay() {
        if (isAutoplayActive) {
            stopAutoplay();
        } else {
            startAutoplay();
        }
    }

    function resetAutoplayTimer() {
        if (isAutoplayActive) {
            stopAutoplay();
            startAutoplay();
        }
    }

    // Initialize Mockup Page
    setupIndicators();
    renderSlide(currentIndex);
    startAutoplay();
</script>

</body>
</html>
