<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVIDS</title>
    <link rel="icon" type="image/ico" href="images/icon.ico">

    <!-- Google Fonts Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Critical inline CSS for instant splash screen render before external stylesheets load -->

    <!-- Unified Stylesheet -->
    <link rel="stylesheet" href="css/global.css?v=20260618T2258">
    <link rel="stylesheet" href="css/loader.css?v=20260520T1345">
    <link rel="stylesheet" href="css/global-mobile.css?v=20260621T1548" media="(orientation: portrait)">
</head>

<body>


    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo-container">
                <img src="images/icon.ico" class="splash-logo-img" alt="IVIDS Icon">
                <h1 class="splash-logo-text">IVIDS</h1>
            </div>
            <div class="splash-loader-container">
                <div class="ivids-loader"></div>
            </div>
        </div>
    </div>


    <!-- Exit Confirmation Modal -->
    <div id="exit-modal" class="modal-overlay">
        <div class="modal-content exit-modal-content">
            <h2 class="modal-title" data-i18n="exit.title">Exit Application</h2>
            <p class="exit-message" data-i18n="exit.message">Are you sure you want to exit IVIDS?</p>
            <div class="modal-footer">
                <button id="confirm-exit-btn" class="btn btn-danger focusable" data-i18n="exit.confirm">Exit</button>
                <button id="cancel-exit-btn" class="btn btn-secondary focusable" data-i18n="exit.cancel">Cancel</button>
            </div>
        </div>
    </div>


    <div id="app">
        <!-- Navigation Bar (Loaded Dynamically) -->
        <div id="sidebar-container"></div>

        <!-- Main Content Area -->
        <div id="main-view"></div>
    </div>

    <!-- Tizen Web Device API -->
    <script src="$WEBAPIS/webapis/webapis.js"></script>

    <!--
    - For **Music**, we will use the **Audius API** as the primary provider. We are also implementing a **fallback mechanism to Jamendo API** in case Audius services are unreachable. This multi-provider approach ensures maximum uptime.
    - **Sidebar**: The sidebar will be expanded to include a "Music" section.
    - **Mobile Restriction**: The Music icon and access points will be HIDDEN in portrait mode (mobile) to keep the bottom navigation clean. Access will be limited to landscape/TV views.
    -->

    <!-- Fetch polyfill for Android TV / file:// protocol - placed BEFORE module scripts to guarantee availability -->
    <script>
        // FIX voor Fetch op Android TV / file:// schema
        const originalFetch = window.fetch;
        /**
         * Polyfills the global fetch API for local resource loading and cross-origin bypass.
         * Intercepts file:// and local paths to route them through XMLHttpRequest to bypass protocol restrictions.
         * 
         * @param {string|Request} url - The URL or request object to fetch.
         * @param {object} [options] - Optional configurations including method, headers, and signal.
         * @returns {Promise<Response>} A promise resolving to a fetch-compatible response object.
         */
        window.fetch = function (url, options) {
            const urlString = typeof url === 'string' ? url : (url && url.url ? url.url : String(url));
            const isLocal = urlString.startsWith('lang/') || urlString.startsWith('pages/') || urlString.startsWith('components/') || urlString.startsWith('file:');
            const isFileProtocol = window.location.protocol === 'file:';
            
            if (isLocal || isFileProtocol) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    const method = (options && options.method) || (url && url.method) || 'GET';
                    xhr.open(method, urlString);
                    
                    if (options && options.headers) {
                        if (typeof Headers !== 'undefined' && options.headers instanceof Headers) {
                            options.headers.forEach((val, key) => {
                                xhr.setRequestHeader(key, val);
                            });
                        } else {
                            Object.entries(options.headers).forEach(([key, val]) => {
                                xhr.setRequestHeader(key, val);
                            });
                        }
                    }
                    
                    xhr.onload = () => {
                        resolve({
                            ok: (xhr.status >= 200 && xhr.status < 300) || xhr.status === 0,
                            status: xhr.status === 0 ? 200 : xhr.status,
                            statusText: xhr.statusText,
                            json: () => Promise.resolve(JSON.parse(xhr.responseText)),
                            text: () => Promise.resolve(xhr.responseText)
                        });
                    };
                    
                    xhr.onerror = () => reject(new Error('Fetch failed via XHR'));
                    if (options && options.signal) {
                        options.signal.addEventListener('abort', () => {
                            xhr.abort();
                            reject(new DOMException('Aborted', 'AbortError'));
                        });
                    }
                    
                    const body = (options && options.body) || (url && url.body) || null;
                    xhr.send(body);
                });
            }
            return originalFetch(url, options);
        };
    </script>

    <!-- Scripts -->
    <!-- Explains: Loads hls.js decoder with defer to avoid blocking HTML parsing (412KB) -->
    <script defer src="js/hls.min.js"></script>
    <script type="module" src="js/loader.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
