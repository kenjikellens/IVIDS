<div class="account-container">
    <div class="account-header">
        <h1 data-i18n="account.title">Account</h1>
    </div>

    <div class="account-section current-profile-section">
        <h2 class="section-title" id="account-section-title" data-i18n="account.currentProfile">Current Account</h2>
        <div class="profile-display">
            <div id="current-profile-avatar" class="profile-avatar large">
                <!-- Avatar text injected here -->
            </div>
            <div class="profile-details">
                <h3 id="current-profile-name" class="profile-name-text"></h3>
                <div class="profile-actions">
                    <button id="account-sign-in-btn" class="btn btn-primary focusable hidden"
                        data-i18n="account.signIn">Sign In</button>
                    <button id="account-create-acc-btn" class="btn btn-secondary focusable hidden"
                        data-i18n="account.createAccount">Create Account</button>
                    <button id="account-sign-out-btn" class="btn btn-danger focusable hidden"
                        data-i18n="account.signOut">Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</div>
