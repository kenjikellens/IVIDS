<div class="details-page">
    <!-- Cinematic Background backdrop -->
    <div class="details-backdrop" id="details-backdrop">
        <div class="details-backdrop-overlay"></div>
    </div>
    <div class="details-layout">
        <div class="details-top">
            <div class="details-info">
                <h1 class="details-title" id="details-title"></h1>
                <div id="details-genres" class="details-genres" aria-hidden="true"></div>
                <div class="details-meta">
                    <span id="details-date"></span>
                    <span id="details-rating"></span>
                </div>
                <p class="details-overview" id="details-overview"></p>
                <div class="details-actions">
                    <button class="btn btn-primary focusable" id="details-play" data-i18n="details.play">Play</button>
                    <button class="btn btn-secondary focusable" id="details-trailer" style="display: none;" data-i18n="details.watchTrailer">Watch Trailer</button>
                    <button class="btn btn-secondary focusable" id="details-playlist"
                        data-i18n="details.addToPlaylist">Add to Playlist</button>
                </div>
            </div>
            <div class="details-poster-container">
                <img id="details-poster" class="details-hero-poster" src="" alt="">
            </div>
        </div>
        <!-- Tabs header bar -->
        <div class="disney-tabs" id="details-tabs">
            <button class="disney-tab-btn focusable active" id="tab-seasons" data-i18n="details.seasons">Seasons</button>
            <button class="disney-tab-btn focusable" id="tab-extra" data-i18n="details.extra">Extra</button>
            <button class="disney-tab-btn focusable" id="tab-about" data-i18n="details.about">About</button>
        </div>
        
        <!-- Tab Panel: Seasons (TV Show only) -->
        <div class="disney-tab-panel details-bottom" id="panel-seasons">
            <div class="details-seasons" id="seasons-container">
                <div id="seasons-list" class="seasons-list-content">
                    <!-- Filled by JS with IVIDS .season-btn -->
                </div>
            </div>
            <div id="details-episodes" class="episodes-list">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Tab Panel: Extra (Trailers & Specials) -->
        <div class="disney-tab-panel" id="panel-extra" style="display: none;">
            <div class="disney-extras-list" id="extras-list">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Tab Panel: About (Synopsis & Cast) -->
        <div class="disney-tab-panel" id="panel-about" style="display: none;">
            <div class="disney-about-content">
                <div class="disney-about-left">
                    <h4 class="disney-about-section-title" data-i18n="details.synopsis">Synopsis</h4>
                    <p class="disney-about-description" id="about-description"></p>
                </div>
                <div class="disney-about-right">
                    <h4 class="disney-about-section-title" data-i18n="details.castAndCrew">Cast & Crew</h4>
                    <div class="disney-cast-grid" id="about-cast">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Add to Playlist Modal -->
<div id="add-to-playlist-modal" class="modal">
    <div class="modal-content">
        <h2 class="modal-title" data-i18n="details.addToPlaylist">Add to Playlist</h2>
        <div id="playlist-selection-list" class="playlist-selection-list">
            <!-- Playlists to select will be injected here -->
        </div>
        <div class="modal-actions">
            <button id="add-to-playlist-cancel" class="btn btn-secondary focusable" data-i18n="details.cancel">Cancel</button>
        </div>
    </div>
</div>

<style>

        padding-bottom: 0.75rem;
    }

    /* Tab button in the tab switcher bar */

    .disney-tab-btn.active {

        border: 2px solid transparent;
        cursor: pointer;
        transition: border-color 0.16s ease, background-color 0.16s ease;
        width: 100%;
    }

    .disney-episode-thumb {

    .disney-episode-info {
        padding: 1.25rem 1.85rem;

        flex-direction: column;
        justify-content: center;
        width: 75%;
    }

    .disney-episode-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-color);
        margin-bottom: 0.5rem;
    }

    /* Overview text block summary within the episode card */
    .disney-episode-overview {
        font-size: 1rem;
        color: var(--text-muted);

        overflow: hidden;
    }

    /* Cinematic backdrop container representing the 16:9 widescreen background image dimmed for readability */
    .details-backdrop {

    }
