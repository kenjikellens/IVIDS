<div class="page-container">
    <div id="playlist-details-view" class="details-page">
        <!-- Cinematic Background backdrop -->
        <div class="playlist-backdrop" id="playlist-backdrop">
            <div class="backdrop-overlay"></div>
        </div>

        <div class="details-layout">
            <div class="details-top">
                <div class="details-info">
                    <h1 class="details-title" id="playlist-title">Playlist Name</h1>
                    <div class="details-genres">
                        <span id="playlist-count">0 items</span>
                        <span class="details-separator meta-separator-dot">•</span>
                        <span data-i18n="playlists.type_label">Playlist</span>
                    </div>
                    <p class="details-overview" id="playlist-desc" data-i18n="playlists.description_default">Your personal collection of favorite movies and shows.</p>
                    <div class="details-actions">
                        <button id="play-all-btn" class="btn btn-primary focusable" data-i18n="playlists.playAll">
                            Play All
                        </button>
                        <button id="edit-info-btn" class="btn btn-secondary focusable" data-i18n="playlists.editInfo">
                            Edit Info
                        </button>
                        <button id="back-btn" class="btn btn-secondary focusable" data-i18n="details.back">
                            Back
                        </button>
                        <button id="delete-playlist-btn" class="btn btn-danger focusable" data-i18n="playlists.delete">
                            Delete Playlist
                        </button>
                    </div>
                </div>
                <div class="details-poster-container">
                    <img id="playlist-poster" class="details-hero-poster playlist-hero-cover" src="" alt="Backdrop">
                </div>
            </div>

            <div class="details-bottom">
                <div class="recommendations-section recommendations-section-layout">
                    <h3 class="row-title large-title-white" data-i18n="playlists.items">Playlist Items</h3>
                    <div id="playlist-items-container" class="episodes-list">
                        <!-- Items injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title" data-i18n="playlists.removeItemTitle">Remove Item</h2>
            <p class="modal-message" data-i18n="playlists.removeItemMessage">Are you sure you want to remove this item from the playlist?</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="btn btn-secondary focusable" data-i18n="playlists.cancel">Cancel</button>
                <button id="modal-confirm-btn" class="btn btn-danger focusable" data-i18n="playlists.deleteItem">Remove</button>
            </div>
        </div>
    </div>

    <!-- Edit Playlist Modal -->
    <div id="edit-playlist-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title" data-i18n="playlists.editInfo">Edit Info</h2>
            <div class="modal-body modal-details-body">
                <input id="edit-playlist-name-input" class="settings-input focusable full-width-settings-input" type="text" placeholder="Playlist Name">
            </div>
            <div class="modal-actions">
                <button id="edit-playlist-cancel-btn" class="btn btn-secondary focusable" data-i18n="playlists.cancel">Cancel</button>
                <button id="edit-playlist-confirm-btn" class="btn btn-secondary focusable">Save</button>
            </div>
        </div>
    </div>

    <!-- Item Context Drawer Modal -->
    <div id="item-context-modal" class="modal-overlay">
        <div class="modal-content context-modal-card">
            <h2 id="context-item-title" class="modal-title modal-title-truncated">Movie Title</h2>
            <div class="modal-actions vertical-modal-actions">
                <button id="context-play-btn" class="btn btn-primary focusable btn-full-center" data-i18n="player.play">Play Content</button>
                <button id="context-details-btn" class="btn btn-secondary focusable btn-full-center" data-i18n="player.moreInfo">View Info Details</button>
                <button id="context-move-up-btn" class="btn btn-secondary focusable btn-full-center">Move Item Up</button>
                <button id="context-move-down-btn" class="btn btn-secondary focusable btn-full-center">Move Item Down</button>
                <button id="context-remove-btn" class="btn btn-danger focusable btn-full-center">Remove from Playlist</button>
                <button id="context-cancel-btn" class="btn btn-secondary focusable btn-full-center" data-i18n="playlists.cancel">Cancel</button>
            </div>
        </div>
    </div>
</div>
</body>
