<div class="page-container" style="padding: 0; height: 100%;">
    <div id="playlist-details-view" class="details-page" style="display: block; opacity: 1;">
        <!-- Cinematic Background backdrop -->
        <div class="playlist-backdrop" id="playlist-backdrop">
            <div class="backdrop-overlay"></div>
        </div>

        <div class="details-layout">
            <div class="details-top">
                <div class="details-info">
                    <h1 class="details-title" id="playlist-title">Playlist Name</h1>
                    <div class="details-genres">
                        <span id="playlist-count">0 items</span>
                        <span class="details-separator" style="color: var(--text-dim); margin: 0 4px;">•</span>
                        <span data-i18n="playlists.type_label">Playlist</span>
                    </div>
                    <p class="details-overview" id="playlist-desc" data-i18n="playlists.description_default">Your personal collection of favorite movies and shows.</p>
                    <div class="details-actions">
                        <button id="play-all-btn" class="btn btn-primary focusable" data-i18n="playlists.playAll">
                            Play All
                        </button>
                        <button id="edit-info-btn" class="btn btn-secondary focusable" data-i18n="playlists.editInfo">
                            Edit Info
                        </button>
                        <button id="back-btn" class="btn btn-secondary focusable" data-i18n="details.back">
                            Back
                        </button>
                        <button id="delete-playlist-btn" class="btn btn-danger focusable" data-i18n="playlists.delete">
                            Delete Playlist
                        </button>
                    </div>
                </div>
                <div class="details-poster-container">
                    <img id="playlist-poster" class="details-hero-poster playlist-hero-cover" src="" alt="Backdrop">
                </div>
            </div>

            <div class="details-bottom">
                <div class="recommendations-section" style="display: block; margin-top: 20px; width: 100%;">
                    <h3 class="row-title" style="margin-bottom:20px; font-size:24px; color:#fff;" data-i18n="playlists.items">Playlist Items</h3>
                    <div id="playlist-items-container" class="playlist-items-grid">
                        <!-- Items injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Remove Item</h2>
            <p class="modal-message">Are you sure you want to remove this item from the playlist?</p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="btn btn-secondary focusable">Cancel</button>
                <button id="modal-confirm-btn" class="btn btn-danger focusable">Remove</button>
            </div>
        </div>
    </div>

    <!-- Edit Playlist Modal -->
    <div id="edit-playlist-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title" data-i18n="playlists.editInfo">Edit Info</h2>
            <div class="modal-body" style="padding: 18px 0; width: 100%;">
                <input id="edit-playlist-name-input" class="settings-input focusable" type="text" placeholder="Playlist Name" style="width: 100%; padding: 12px; border-radius: var(--radius-md); border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 8px;">
            </div>
            <div class="modal-actions">
                <button id="edit-playlist-cancel-btn" class="btn btn-secondary focusable" data-i18n="playlists.cancel">Cancel</button>
                <button id="edit-playlist-confirm-btn" class="btn btn-primary focusable">Save</button>
            </div>
        </div>
    </div>

    <!-- Item Context Drawer Modal -->
    <div id="item-context-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 460px; padding: 28px;">
            <h2 id="context-item-title" class="modal-title" style="margin-bottom: 20px; font-size: 24px; text-align: center; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">Movie Title</h2>
            <div class="modal-actions" style="flex-direction: column; gap: 10px; width: 100%;">
                <button id="context-play-btn" class="btn btn-primary focusable" style="width: 100%; justify-content: center;" data-i18n="player.play">Play Content</button>
                <button id="context-details-btn" class="btn btn-secondary focusable" style="width: 100%; justify-content: center;" data-i18n="player.moreInfo">View Info Details</button>
                <button id="context-move-up-btn" class="btn btn-secondary focusable" style="width: 100%; justify-content: center;">Move Item Up</button>
                <button id="context-move-down-btn" class="btn btn-secondary focusable" style="width: 100%; justify-content: center;">Move Item Down</button>
                <button id="context-remove-btn" class="btn btn-danger focusable" style="width: 100%; justify-content: center;">Remove from Playlist</button>
                <button id="context-cancel-btn" class="btn btn-secondary focusable" style="width: 100%; justify-content: center;" data-i18n="playlists.cancel">Cancel</button>
            </div>
        </div>
    </div>
</div>
</body>
