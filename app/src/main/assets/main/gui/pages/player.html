<div class="video-container" id="video-container"
    style="position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden;">
    <div class="player-container">
        <div id="video-player"></div>
        <video id="native-video-player" style="display: none; width: 100%; height: 100%; background: #000;"
            controls></video>
        <div id="player-status-panel" class="player-status-panel" style="display: none;">
            <h2 id="player-status-title">Player is taking too long</h2>
            <p id="player-status-message">The configured player provider did not respond yet. You can go back or change the player endpoint in Settings.</p>
            <div class="player-status-actions">
                <button id="player-status-back" class="btn-back focusable" data-i18n="details.back">Back</button>
                <button id="player-status-settings" class="btn-next focusable" data-i18n="nav.settings">Settings</button>
            </div>
        </div>
        <div class="player-controls">
            <button class="btn-back focusable" id="player-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                <span data-i18n="details.back">Back</span>
            </button>
            <div id="next-episode-container" style="display: none;">
                <button class="btn-next focusable" id="player-next">
                    <span data-i18n="player.nextEpisode">Next Episode</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="server-selection-overlay" id="server-selection-overlay">
            <h3 class="server-selection-title" data-i18n="player.selectServer">Select Server</h3>
            <div class="server-list" id="player-server-list"></div>
        </div>
    </div>
</div>
