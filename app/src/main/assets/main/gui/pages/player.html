<div class="video-container" id="video-container">
    <div class="player-container">
        <div id="video-player" class="full-size"></div>
        <video id="native-video-player" class="hidden"
            controls></video>
        
        <!-- Premium HUD Overlay -->
        <div id="player-hud" class="player-hud hidden">
            <!-- Bottom Panel containing back button, server selection, and next button in a grid layout -->
            <div class="hud-bottom-panel">
                <div class="hud-control-slot hud-slot-left">
                    <button class="btn btn-secondary focusable" id="player-back">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        <span data-i18n="details.back">Back</span>
                    </button>
                </div>

                <div class="hud-control-slot hud-slot-middle">
                    <div class="server-selection-overlay" id="server-selection-overlay">
                        <div class="server-list" id="player-server-list"></div>
                    </div>
                </div>

                <div class="hud-control-slot hud-slot-right">
                    <div id="next-episode-container" class="hidden">
                        <button class="btn btn-primary focusable" id="player-next">
                            <span data-i18n="player.nextEpisode">Next Episode</span>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Premium Spinner Loading Overlay -->
        <div id="player-loading-overlay" class="player-loading-overlay">
            <div class="ivids-loader"></div>
            <span class="player-loading-text" data-i18n="player.loading">Loading...</span>
        </div>

        <!-- Warning/Status Panel when loading takes too long -->
        <div id="player-status-panel" class="player-status-panel hidden">
            <h2 id="player-status-title" data-i18n="player.statusTitle">Player is taking too long</h2>
            <p id="player-status-message" data-i18n="player.statusMessage">The configured player provider did not respond yet. You can go back or change the player endpoint in Settings.</p>
            <div class="player-status-actions">
                <button id="player-status-back" class="btn btn-secondary focusable" data-i18n="details.back">Back</button>
                <button id="player-status-settings" class="btn btn-primary focusable" data-i18n="nav.settings">Settings</button>
            </div>
        </div>
    </div>
</div>
