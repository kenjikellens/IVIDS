<div class="livetv-page-layout">
    <!-- Top Area: Search and Compact Actions -->
    <div class="livetv-top-bar">
        <div class="search-box">
            <div class="input-wrapper">
                <img src="images/search.svg" class="search-icon" alt="Search">
                <input type="text" id="search-input" class="focusable" placeholder="Search for channels..."
                    data-i18n="livetv.searchPlaceholder" readonly>
                <button id="search-clear" class="search-clear-btn focusable" style="display: none;">&times;</button>
            </div>
        </div>

        <div class="livetv-top-actions">
            <!-- Genre Select -->
            <div class="filter-select-wrapper">
                <select id="filter-genre" class="filter-select focusable">
                    <option value="" data-i18n="livetv.allGenres">All Genres</option>
                </select>
            </div>
            <!-- Country Select -->
            <div class="filter-select-wrapper">
                <select id="filter-country" class="filter-select focusable">
                    <option value="" data-i18n="livetv.allCountries">All Countries</option>
                </select>
            </div>

        </div>
    </div>



    <!-- Two-Column Layout Body -->
    <div class="livetv-two-column-layout">
        <!-- Left Column: Scrollable list of channels -->
        <div class="livetv-list-column">
            <div class="channels-list" id="channels-list">
                <!-- Dynamically injected wide rectangular rows -->
            </div>

            <div id="no-channels-message" class="empty-state" style="display: none;">
                <p data-i18n="livetv.noChannels">No channels found</p>
            </div>
        </div>

        <!-- Right Column: Channel Preview & EPG details -->
        <div class="livetv-preview-column">
            <!-- Default Placeholder when no channel is focused -->
            <div id="hero-placeholder" class="hero-placeholder-content">
                <div class="placeholder-icon-large"></div>
                <h1 data-i18n="livetv.title">Live TV</h1>
                <p data-i18n="livetv.selectSubtitle">Discover and watch hundreds of live channels</p>
            </div>

            <!-- Active Channel Details -->
            <div id="hero-active-content" class="hero-active-content" style="display: none;">
                <!-- Top Card: Video Preview / Channel info & Watch button -->
                <!-- Top Card: Video Preview -->
                <div class="preview-card-video">
                    <video id="livetv-preview-video" autoplay muted playsinline></video>
                    <div id="preview-video-loading" class="preview-video-loading" style="display: none;">
                        <div class="ivids-loader"></div>
                    </div>
                </div>

                <!-- Bottom Card: Current & Upcoming Program EPG Schedules -->
                <div class="epg-card">
                    <!-- Current Program Schedule -->
                    <div id="hero-epg-container" class="details-epg-section" style="display: none;">
                        <h3 class="section-title">
                            <span class="live-badge" data-i18n="livetv.live">LIVE</span>
                            <span data-i18n="livetv.playingNow">Playing Now</span>
                        </h3>
                        <div class="epg-active-show">
                            <span id="hero-epg-title" class="epg-show-title"></span>
                            <div class="hero-epg-progress-wrapper">
                                <span id="hero-epg-start" class="epg-time"></span>
                                <div class="epg-progress-bar-container">
                                    <div id="hero-epg-progress" class="epg-progress-bar-fill"></div>
                                </div>
                                <span id="hero-epg-end" class="epg-time"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Upcoming Programs list -->
                    <div class="details-upcoming-section">
                        <h3 class="section-title" data-i18n="livetv.upcoming">Upcoming Programs</h3>
                        <div class="upcoming-programs-list" id="upcoming-programs-list">
                            <!-- Injected upcoming show rows -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
